name: Build FVAIOS Live ISO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ALPINE_VERSION: 3.19.1
      ARCH: x86_64
      ISO_NAME: fvaios-live
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso wget

      - name: Download Alpine official ISO
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/alpine-standard-${ALPINE_VERSION}-x86_64.iso
          
      - name: Extract official ISO files
        run: |
          mkdir -p official_iso custom_iso
          sudo mount -o loop alpine-standard-${ALPINE_VERSION}-x86_64.iso official_iso
          cp -r official_iso/* custom_iso/
          sudo umount official_iso

      - name: Build custom rootfs
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/alpine-minirootfs-${ALPINE_VERSION}-x86_64.tar.gz
          mkdir -p rootfs
          sudo tar xzf alpine-minirootfs-${ALPINE_VERSION}-x86_64.tar.gz -C rootfs
          sudo cp /etc/resolv.conf rootfs/etc/
          sudo cp packages.list rootfs/
          sudo cp motd rootfs/etc/motd
          sudo mkdir -p rootfs/usr/local/sbin
          sudo cp yuliu-install rootfs/usr/local/sbin/
          sudo chmod +x rootfs/usr/local/sbin/yuliu-install
          sudo mount --bind /dev rootfs/dev
          sudo mount --bind /proc rootfs/proc
          sudo mount --bind /sys rootfs/sys
          sudo cp customize.sh rootfs/
          sudo chroot rootfs /bin/sh /customize.sh
          sudo umount -l rootfs/dev
          sudo umount -l rootfs/proc
          sudo umount -l rootfs/sys

      - name: Replace squashfs in custom ISO
        run: |
          sudo mksquashfs rootfs custom_iso/alpine.squashfs -comp xz -noappend
          sudo chown $USER custom_iso/alpine.squashfs

      - name: Create bootable ISO
        run: |
          xorriso -as mkisofs \
            -o ${{ env.ISO_NAME }}.iso \
            -R -J \
            -b boot/syslinux/isolinux.bin \
            -c boot/syslinux/boot.cat \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            -eltorito-alt-boot \
            -e boot/grub/efi.img \
            -no-emul-boot \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -V "FVAIOS_LIVE" \
            custom_iso/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fvaios-iso
          path: ${{ env.ISO_NAME }}.iso

      - name: Create release and upload ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          name: "FVAIOS Live ${{ github.run_id }}"
          files: ${{ env.ISO_NAME }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
