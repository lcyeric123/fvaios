name: Build FVAIOS Live ISO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ALPINE_VERSION: 3.19.1
      ARCH: x86_64
      ISO_NAME: fvaios-live
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso isolinux mtools wget cpio

      - name: Download Alpine official ISO
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/alpine-standard-${ALPINE_VERSION}-x86_64.iso
          mkdir -p iso-mount
          sudo mount -o loop alpine-standard-${ALPINE_VERSION}-x86_64.iso iso-mount
          cp iso-mount/boot/vmlinuz-lts .
          cp iso-mount/boot/initramfs-lts .
          sudo umount iso-mount

      - name: Download Alpine minirootfs and customize
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/alpine-minirootfs-${ALPINE_VERSION}-x86_64.tar.gz
          mkdir -p rootfs
          sudo tar xzf alpine-minirootfs-${ALPINE_VERSION}-x86_64.tar.gz -C rootfs
          
          # Prepare chroot
          sudo cp /etc/resolv.conf rootfs/etc/
          sudo cp packages.list rootfs/
          sudo cp motd rootfs/etc/motd
          sudo mkdir -p rootfs/usr/local/sbin
          sudo cp yuliu-install rootfs/usr/local/sbin/
          sudo chmod +x rootfs/usr/local/sbin/yuliu-install
          sudo mount --bind /dev rootfs/dev
          sudo mount --bind /proc rootfs/proc
          sudo mount --bind /sys rootfs/sys

      - name: Customize rootfs
        run: |
          sudo cp customize.sh rootfs/
          sudo chroot rootfs /bin/sh /customize.sh

      - name: Cleanup chroot
        run: |
          sudo umount -l rootfs/dev
          sudo umount -l rootfs/proc
          sudo umount -l rootfs/sys

      - name: Create squashfs
        run: |
          sudo mksquashfs rootfs alpine.squashfs -comp xz -noappend
          sudo chown $USER alpine.squashfs

      - name: Prepare ISO directory
        run: |
          mkdir -p iso/boot
          cp vmlinuz-lts iso/boot/
          cp initramfs-lts iso/boot/
          cp alpine.squashfs iso/

          # Create answer file for setup-alpine
          cat > iso/fvaios.apkovl.tar.gz << 'EOF'
          dummy
          EOF

      - name: Build ISO
        run: |
          xorriso -as mkisofs \
            -o ${{ env.ISO_NAME }}.iso \
            -R -J \
            -V "FVAIOS_LIVE" \
            -b boot/vmlinuz-lts \
            -c boot/boot.catalog \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            iso/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fvaios-iso
          path: ${{ env.ISO_NAME }}.iso

      - name: Create release and upload ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          name: "FVAIOS Live ${{ github.run_id }}"
          files: ${{ env.ISO_NAME }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
