name: Build FVAIOS Live ISO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ALPINE_VERSION: 3.19
      ARCH: x86_64
      ISO_NAME: fvaios-live
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso isolinux mtools

      - name: Download Alpine minirootfs
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v${ALPINE_VERSION}/releases/${ARCH}/alpine-minirootfs-${ALPINE_VERSION}.1-${ARCH}.tar.gz
          mkdir -p rootfs
          sudo tar xzf alpine-minirootfs-${ALPINE_VERSION}.1-${ARCH}.tar.gz -C rootfs

      - name: Prepare chroot environment
        run: |
          sudo cp /etc/resolv.conf rootfs/etc/
          sudo cp packages.list rootfs/
          sudo cp motd rootfs/etc/motd
          sudo cp build_llama.sh rootfs/
          sudo mkdir -p rootfs/usr/local/sbin
          sudo cp yuliu-install rootfs/usr/local/sbin/
          sudo chmod +x rootfs/build_llama.sh rootfs/usr/local/sbin/yuliu-install
          sudo mount --bind /dev rootfs/dev
          sudo mount --bind /proc rootfs/proc
          sudo mount --bind /sys rootfs/sys

      - name: Customize rootfs
        run: |
          sudo cp customize.sh rootfs/
          sudo chroot rootfs /bin/sh /customize.sh

      - name: Cleanup chroot
        run: |
          sudo umount -l rootfs/dev
          sudo umount -l rootfs/proc
          sudo umount -l rootfs/sys

      - name: Create squashfs
        run: |
          sudo mksquashfs rootfs alpine.squashfs -comp xz -noappend -wildcards -e "dev/*" "proc/*" "sys/*" "tmp/*" "run/*" "mnt/*" "media/*" "packages.list" "build_llama.sh" "customize.sh"
          sudo chown $USER alpine.squashfs

      - name: Prepare ISO directory
        run: |
          mkdir -p iso/boot/grub
          cp rootfs/boot/vmlinuz-lts iso/boot/
          cp rootfs/boot/initramfs-lts iso/boot/
          cp alpine.squashfs iso/

          # isolinux
          mkdir -p iso/isolinux
          cp /usr/lib/ISOLINUX/isolinux.bin iso/isolinux/
          cp /usr/lib/syslinux/modules/bios/ldlinux.c32 iso/isolinux/
          cat > iso/isolinux/isolinux.cfg << 'EOF'
          DEFAULT fvaios
          SAY Booting FVAIOS Live...
          LABEL fvaios
              KERNEL /boot/vmlinuz-lts
              APPEND initrd=/boot/initramfs-lts modules=loop,squashfs,cdrom quiet alpine_dev=cdrom:iso9660
          EOF

          # EFI boot via grub
          sudo apt-get install -y grub-efi-amd64-bin
          mkdir -p efi_mount
          dd if=/dev/zero of=efi.img bs=1M count=5
          mkfs.vfat efi.img
          sudo mount -o loop efi.img efi_mount
          sudo mkdir -p efi_mount/EFI/BOOT
          sudo cp /usr/lib/grub/x86_64-efi/monolithic/grubx64.efi efi_mount/EFI/BOOT/BOOTX64.EFI
          cat > grub.cfg << 'EOF'
          set timeout=3
          menuentry "FVAIOS Live" {
              linux /boot/vmlinuz-lts modules=loop,squashfs,cdrom quiet alpine_dev=cdrom:iso9660
              initrd /boot/initramfs-lts
          }
          EOF
          sudo cp grub.cfg efi_mount/
          sudo umount efi_mount
          cp efi.img iso/boot/grub/

      - name: Build ISO
        run: |
          xorriso -as mkisofs \
            -o ${ISO_NAME}.iso \
            -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot \
            -e boot/grub/efi.img \
            -no-emul-boot \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -isohybrid-gpt-basdat \
            -V "FVAIOS_LIVE" \
            iso/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fvaios-iso
          path: ${ISO_NAME}.iso

      - name: Create release and upload ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          name: "FVAIOS Live ${{ github.run_id }}"
          files: ${ISO_NAME}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
