name: Build FVAIOS Live ISO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ALPINE_VERSION: 3.19.1
      ARCH: x86_64
      ISO_NAME: fvaios-live
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso isolinux mtools wget

      - name: Download and customize Alpine minirootfs
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/alpine-minirootfs-${ALPINE_VERSION}-x86_64.tar.gz
          mkdir -p rootfs
          sudo tar xzf alpine-minirootfs-${ALPINE_VERSION}-x86_64.tar.gz -C rootfs
          sudo cp /etc/resolv.conf rootfs/etc/
          sudo cp packages.list rootfs/
          sudo cp motd rootfs/etc/motd
          sudo mkdir -p rootfs/usr/local/sbin
          sudo cp yuliu-install rootfs/usr/local/sbin/
          sudo chmod +x rootfs/usr/local/sbin/yuliu-install
          sudo mount --bind /dev rootfs/dev
          sudo mount --bind /proc rootfs/proc
          sudo mount --bind /sys rootfs/sys

      - name: Customize rootfs
        run: |
          sudo cp customize.sh rootfs/
          sudo chroot rootfs /bin/sh /customize.sh

      - name: Cleanup chroot
        run: |
          sudo umount -l rootfs/dev
          sudo umount -l rootfs/proc
          sudo umount -l rootfs/sys

      - name: Build ISO
        run: |
          mkdir -p iso
          sudo cp rootfs/boot/vmlinuz-lts iso/
          sudo cp rootfs/boot/initramfs-lts iso/
          sudo chmod 644 iso/vmlinuz-lts iso/initramfs-lts
          
          sudo mksquashfs rootfs iso/alpine.squashfs -comp xz -noappend
          
          mkdir -p iso/isolinux
          cat > iso/isolinux/isolinux.cfg << 'EOF'
          DEFAULT fvaios
          SAY Booting FVAIOS Live...
          
          LABEL fvaios
              KERNEL /vmlinuz-lts
              INITRD /initramfs-lts
              APPEND modules=loop,squashfs,sd-mod,usb-storage,sr-mod quiet
          EOF
          
          xorriso -as mkisofs \
            -o ${{ env.ISO_NAME }}.iso \
            -R -J \
            -b isolinux/isolinux.cfg \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -V "FVAIOS_LIVE" \
            iso/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fvaios-iso
          path: ${{ env.ISO_NAME }}.iso

      - name: Create release and upload ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.run_id }}
          name: "FVAIOS Live ${{ github.run_id }}"
          files: ${{ env.ISO_NAME }}.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
